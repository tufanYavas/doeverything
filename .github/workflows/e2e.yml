name: E2E Tests

on: [pull_request_target]

permissions:
  contents: read

jobs:
  e2e:
    name: E2E (Chrome)
    runs-on: ubuntu-latest
    env:
      DOE_CI: true
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm
      - run: pnpm install --frozen-lockfile --prefer-offline
      # Chrome 136 + ChromeDriver 136 required (137+ removed --load-extension support)
      - run: pnpm e2e:setup
      - run: pnpm e2e
