name: Redirect PRs to dev

on:
  pull_request_target:
    types: [opened]

jobs:
  check-branch:
    name: Redirect main → dev
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: Vankka/pr-target-branch-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          target: main
          exclude: dev
          change-to: dev
          comment: |
            PRs should target the `dev` branch, not `main`. The base branch has been automatically changed to `dev` — please check for merge conflicts.
          already-exists-action: close_this
          already-exists-comment: "Closing — a PR from this branch already exists: {url}"
